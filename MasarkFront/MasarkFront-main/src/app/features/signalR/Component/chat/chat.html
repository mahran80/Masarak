<div class="flex flex-col h-[450px] w-[320px] bg-white rounded-xl border overflow-hidden shadow mx-auto">

  <!-- Header -->
  <div class="bg-blue-500 text-white text-center py-2 text-sm font-semibold">
    الدردشة
  </div>

  <!-- Messages -->
  <div class="flex-1 overflow-y-auto p-3 space-y-3 bg-slate-50">

    @for (msg of store.messages(); track msg.messageId) {

      <div class="flex flex-col">

        <span class="text-[11px] text-slate-500 mb-1">
          {{ msg.senderName }}
        </span>

        <div class="flex items-end gap-2">

          <div
            class="max-w-[75%] bg-blue-100 text-slate-800 px-3 py-2 rounded-2xl rounded-tr-md text-sm">

            {{ msg.content }}

          </div>
<!-- 
<span class="text-[10px] text-slate-400">
            {{ msg.sentAt | date:'HH:mm' }}
          </span> -->

        </div>

      </div>

    }

  </div>

  <!-- Input -->
  <div class="border-t bg-white p-2">

    <div class="flex items-center gap-2">

      <input
        [(ngModel)]="message"
        (keyup.enter)="send()"
        placeholder="اكتب رسالتك..."
        class="flex-1 rounded-full border border-slate-300 px-3 py-2 text-sm outline-none" />

      <button
        (click)="send()"
        class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center">

        ➤

      </button>

    </div>

  </div>

</div>
