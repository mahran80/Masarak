<article class="rounded-lg border border-slate-200 bg-white p-5 text-right shadow-sm" dir="rtl">
  <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
    <div>
      <p class="text-sm font-semibold text-slate-500">Attendance Summary</p>
      <h2 class="mt-2 text-3xl font-bold text-slate-950">{{ attendanceRate() }}%</h2>
    </div>
    <span class="w-fit rounded-full bg-sky-50 px-3 py-1 text-sm font-semibold text-sky-700 ring-1 ring-sky-200">
      {{ totalSessions() }} sessions
    </span>
  </div>

  <div class="mt-5 h-3 overflow-hidden rounded-full bg-slate-100">
    <div class="h-full rounded-full bg-emerald-500 transition-all duration-500" [style.width.%]="attendanceRate()"></div>
  </div>

  @if (summary(); as data) {
    <dl class="mt-5 grid gap-3 sm:grid-cols-4">
      <div class="rounded-lg bg-emerald-50 p-4">
        <dt class="text-xs font-semibold uppercase tracking-normal text-emerald-700">Present</dt>
        <dd class="mt-1 text-2xl font-bold text-emerald-800">{{ data.presentCount }}</dd>
      </div>
      <div class="rounded-lg bg-rose-50 p-4">
        <dt class="text-xs font-semibold uppercase tracking-normal text-rose-700">Absent</dt>
        <dd class="mt-1 text-2xl font-bold text-rose-800">{{ data.absentCount }}</dd>
      </div>
      <div class="rounded-lg bg-amber-50 p-4">
        <dt class="text-xs font-semibold uppercase tracking-normal text-amber-700">Late</dt>
        <dd class="mt-1 text-2xl font-bold text-amber-800">{{ data.lateCount ?? 0 }}</dd>
      </div>
      <div class="rounded-lg bg-indigo-50 p-4">
        <dt class="text-xs font-semibold uppercase tracking-normal text-indigo-700">Excused</dt>
        <dd class="mt-1 text-2xl font-bold text-indigo-800">{{ data.excusedCount ?? 0 }}</dd>
      </div>
    </dl>
  } @else {
    <p class="mt-5 rounded-lg border border-dashed border-slate-300 p-5 text-sm text-slate-500">
      No attendance summary is available.
    </p>
  }
</article>
